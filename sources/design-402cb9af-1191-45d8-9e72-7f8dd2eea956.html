<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
    <title vid="4">Kitty Mash Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" vid="5">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="6">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&amp;display=swap" rel="stylesheet" vid="7">
    
    

    <style vid="8">
        :root {
            --pink: #FF2A85;
            --orange: #FF7B00;
            --lime: #84CC16;
            --blue: #3B82F6;
            --purple: #8B5CF6;
            --bg-color: #E0F2FE;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #F8FAFC 0%, var(--bg-color) 100%);
            font-family: 'Fredoka', sans-serif;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><text y="24" font-size="24">🐾</text></svg>') 16 16, auto;
        }

        
        #playground {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        
        #intro {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none; 
            transition: opacity 0.3s ease-out, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #intro.hidden {
            opacity: 0;
            transform: scale(1.5);
        }

        .title-container {
            text-align: center;
            line-height: 1.1;
        }

        .bouncy-word {
            display: block;
            font-size: clamp(4rem, 8vw, 8rem);
            font-weight: 700;
            color: white;
            text-shadow: 
                -3px -3px 0 var(--blue),  
                 3px -3px 0 var(--blue),
                -3px  3px 0 var(--blue),
                 3px  3px 0 var(--blue),
                 4px  8px 0 rgba(0,0,0,0.1);
            letter-spacing: -0.02em;
        }

        .bouncy-word span {
            display: inline-block;
            animation: idleBounce 2s infinite ease-in-out;
            transform-origin: bottom center;
        }

        .subtitle {
            margin-top: 20px;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: var(--pink);
            background: white;
            padding: 10px 30px;
            border-radius: 50px;
            border: 4px solid var(--pink);
            box-shadow: 0 8px 0 rgba(255, 42, 133, 0.2);
            animation: pulse 1.5s infinite;
        }

        
        
        
        .sticker {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            pointer-events: none;
            will-change: transform, opacity;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, floatAway 3s 1s ease-in forwards;
        }

        .sticker .emoji {
            font-size: 5rem;
            line-height: 1;
            filter: drop-shadow(0 4px 0 rgba(0,0,0,0.1));
        }

        
        .trail-item {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            will-change: transform, opacity;
            animation: trailFade 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        
        .particle {
            position: absolute;
            border-radius: 50px;
            pointer-events: none;
            will-change: transform, opacity;
            animation: explode 1s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
        }

        
        @keyframes idleBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity: 0; }
            70% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes floatAway {
            0% { transform: translate(-50%, -50%) scale(1) translateY(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.8) translateY(100vh); opacity: 0; }
        }

        @keyframes trailFade {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5) rotate(45deg); opacity: 0; }
        }

        @keyframes explode {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1) rotate(var(--rot)); opacity: 0; }
        }

    </style>
</head>
<body vid="9">

    <div id="intro" vid="10">
        <div class="title-container" id="title-text" vid="11">
            <span class="bouncy-word" vid="12">MASH THE</span>
            <span class="bouncy-word" vid="13">KEYBOARD!</span>
        </div>
        <div class="subtitle" vid="14">OR WIGGLE THE MOUSE</div>
    </div>

    <div id="playground" vid="15"></div>

    <script vid="16">
        
        const colors = ['#FF2A85', '#FF7B00', '#84CC16', '#3B82F6', '#8B5CF6'];
        const mainKitties = ['🐱', '😸', '😹', '😻', '😼', '😽', '🙀', '😿', '😾', '🐯', '🦁'];
        const trailEmojis = ['🐾', '🧶', '🐟', '🥛', '✨', '🌟', '💕'];
        
        const playground = document.getElementById('playground');
        const intro = document.getElementById('intro');
        let hasStarted = false;

        
        let audioCtx = null;
        
        
        const notes = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];

        function playPopSound() {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            
            const freq = notes[Math.floor(Math.random() * notes.length)];
            
            
            osc.type = Math.random() > 0.5 ? 'sine' : 'triangle';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + 0.1);

            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.02); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3); 

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }


        

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        
        function styleIntroText() {
            const words = document.querySelectorAll('.bouncy-word');
            words.forEach(word => {
                const text = word.innerText;
                word.innerHTML = '';
                [...text].forEach((char, i) => {
                    if (char === ' ') {
                        word.appendChild(document.createTextNode(' '));
                        return;
                    }
                    const span = document.createElement('span');
                    span.innerText = char;
                    span.style.color = colors[i % colors.length];
                    span.style.animationDelay = `${i * 0.1}s`;
                    
                    span.style.transform = `rotate(${i % 2 === 0 ? '-3deg' : '3deg'})`;
                    word.appendChild(span);
                });
            });
        }
        styleIntroText();

        function createConfetti(x, y, color) {
            const count = 5 + Math.random() * 5;
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                
                const type = Math.random();
                if(type > 0.6) {
                    particle.style.width = '15px';
                    particle.style.height = '15px';
                    particle.style.borderRadius = '50%';
                } else if (type > 0.3) {
                    particle.style.width = '20px';
                    particle.style.height = '8px';
                    particle.style.borderRadius = '4px';
                } else {
                    particle.style.width = '12px';
                    particle.style.height = '12px';
                    particle.style.borderRadius = '2px';
                }

                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;

                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 100;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                const rot = (Math.random() - 0.5) * 360;

                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                particle.style.setProperty('--rot', `${rot}deg`);

                playground.appendChild(particle);
                particle.addEventListener('animationend', () => particle.remove());
            }
        }

        function spawnMainKitty(x, y) {
            const sticker = document.createElement('div');
            sticker.classList.add('sticker');
            
            const size = 100 + Math.random() * 80; 
            sticker.style.width = `${size}px`;
            sticker.style.height = `${size}px`;
            
            
            const posX = x !== undefined ? x : (Math.random() * 0.8 + 0.1) * window.innerWidth;
            const posY = y !== undefined ? y : (Math.random() * 0.6 + 0.2) * window.innerHeight;
            
            sticker.style.left = `${posX}px`;
            sticker.style.top = `${posY}px`;

            
            const borderColor = getRandomColor();
            sticker.style.border = `${size * 0.08}px solid ${borderColor}`;
            
            
            const r = () => 30 + Math.random() * 40;
            sticker.style.borderRadius = `${r()}% ${r()}% ${r()}% ${r()}% / ${r()}% ${r()}% ${r()}% ${r()}%`;

            const emoji = document.createElement('div');
            emoji.classList.add('emoji');
            emoji.innerText = mainKitties[Math.floor(Math.random() * mainKitties.length)];
            
            emoji.style.fontSize = `${size * 0.6}px`;

            sticker.appendChild(emoji);
            playground.appendChild(sticker);

            
            createConfetti(posX, posY, borderColor);

            
            sticker.addEventListener('animationend', (e) => {
                if(e.animationName === 'floatAway') sticker.remove();
            });
        }

        

        function startGame() {
            if (!hasStarted) {
                hasStarted = true;
                intro.classList.add('hidden');
                initAudio();
            }
        }

        
        window.addEventListener('keydown', (e) => {
            
            
            if (!e.ctrlKey && !e.metaKey && e.key !== 'F5' && e.key !== 'F12') {
                e.preventDefault();
            }
            startGame();
            spawnMainKitty();
            playPopSound();
        });

        
        let lastMoveTime = 0;
        let lastX = 0;
        let lastY = 0;

        function handlePointerMove(e) {
            startGame();
            
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);
            
            if (!x || !y) return;

            const now = Date.now();
            
            const dist = Math.hypot(x - lastX, y - lastY);
            
            if (now - lastMoveTime > 30 && dist > 20) {
                
                const trailItem = document.createElement('div');
                trailItem.classList.add('trail-item');
                trailItem.innerText = trailEmojis[Math.floor(Math.random() * trailEmojis.length)];
                
                
                const offsetX = (Math.random() - 0.5) * 20;
                const offsetY = (Math.random() - 0.5) * 20;
                
                trailItem.style.left = `${x + offsetX}px`;
                trailItem.style.top = `${y + offsetY}px`;
                
                
                const rot = (Math.random() - 0.5) * 45;
                trailItem.style.transform = `translate(-50%, -50%) rotate(${rot}deg)`;
                
                
                const c = getRandomColor();
                trailItem.style.textShadow = `0 0 4px ${c}, 0 0 10px ${c}`;

                playground.appendChild(trailItem);
                
                
                trailItem.addEventListener('animationend', () => trailItem.remove());

                lastMoveTime = now;
                lastX = x;
                lastY = y;
                
                
                if (Math.random() > 0.95) {
                    spawnMainKitty(x, y);
                    playPopSound();
                }
            }
        }

        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('touchmove', handlePointerMove, { passive: false }); 
        
        
        window.addEventListener('mousedown', (e) => {
            startGame();
            spawnMainKitty(e.clientX, e.clientY);
            playPopSound();
        });
        window.addEventListener('touchstart', (e) => {
            startGame();
            if(e.touches.length > 0) {
                spawnMainKitty(e.touches[0].clientX, e.touches[0].clientY);
                playPopSound();
            }
        });

    </script>

</body></html>
