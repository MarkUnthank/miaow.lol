<html lang="en" vid="0"><head vid="1">
<meta charset="UTF-8" vid="2">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
<title vid="4">Wonderfur Masher!</title>
<link rel="preconnect" href="https://fonts.googleapis.com" vid="5">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" vid="6">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&amp;family=Mali:wght@600;700&amp;display=swap" rel="stylesheet" vid="7">
<style vid="8">
    :root {
        --yellow: #FFD932;
        --yellow-dark: #EBBF1A;
        --blue: #1932D1;
        --pink: #EE357B;
        --black: #111111;
        --white: #FFFFFF;
        
        --font-display: 'Fredoka One', cursive;
        --font-marker: 'Mali', cursive;
    }

    * {
        box-sizing: border-box;
        user-select: none; 
        -webkit-user-drag: none;
    }

    body, html {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background-color: var(--yellow);
        font-family: var(--font-display);
        cursor: crosshair; 
    }

    
    .bg-pattern {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 0;
        opacity: 0.6;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg stroke='%23EBBF1A' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M20.5 35c-2.5-3-1.5-7.5 2-9 4-1.5 8.5 2 7 6-1 2.5-4 5.5-6.5 4-2.5-1.5-3.5-3-2.5-5 1-2 4-2.5 5.5-1m10 5c3 2 7 0 8-3.5 1-4-3-7.5-6.5-6-3 1.5-4 5-2.5 7.5 1.5 2 3.5 3 4.5 2 1-1 0-3-1-4.5M15 50c-3 1-5-2-4-5 1-3.5 5-4.5 7-1.5 2 2.5 0 5.5-2 6-2 .5-3-1-3.5-2-.5-1 .5-2.5 2-2.5m20 3c3-1 4-4 2-6.5-2-3-6-2.5-7.5.5-1.5 2.5 0 6 2.5 6.5 2 .5 3.5-.5 4-1.5.5-1-.5-2.5-1.5-3M26 62c-6 0-10-4-11-9 0-4 3-7 7-8s8 2 10 5c1.5 3 0 7-3 9-2 1.5-4 2-5 3v-2'/%3E%3Cpath d='M85 85h20v-5H85a5 5 0 01-5-5V65h-5v10a10 10 0 0010 10zM15 95c-2-3-5-3-7-1s-3 6-1 9 6 4 9 2 4-7 1-10c-2-2-5-2-7 0m0 0c2 2 2 5 0 7m7-7c-2 2-2 5 0 7'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    #canvas {
        position: relative;
        width: 100vw;
        height: 100vh;
        z-index: 1;
    }

    
    #prompt {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--white);
        border: 5px solid var(--black);
        border-radius: 40px;
        padding: 20px 40px;
        text-align: center;
        box-shadow: 8px 8px 0px var(--pink);
        animation: float 3s ease-in-out infinite;
        pointer-events: none;
        transition: opacity 0.3s, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #prompt h1 {
        color: var(--blue);
        margin: 0;
        font-size: 3rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        -webkit-text-stroke: 1px var(--black);
    }
    #prompt p {
        font-family: var(--font-marker);
        color: var(--black);
        font-size: 1.5rem;
        margin: 10px 0 0 0;
        font-weight: 700;
    }
    #prompt.hidden {
        opacity: 0;
        transform: translate(-50%, -30%) scale(0.5);
    }

    @keyframes float {
        0%, 100% { transform: translate(-50%, -50%) rotate(-2deg); }
        50% { transform: translate(-50%, -55%) rotate(2deg); }
    }

    .spawn {
        position: absolute;
        pointer-events: none; 
        transform-origin: center center;
        will-change: transform, opacity;
    }

    
    .trail-item {
        font-size: 2rem;
        animation: trailFade 1s forwards;
    }
    .trail-dot {
        width: 15px; height: 15px;
        background: var(--pink);
        border-radius: 50%;
        border: 3px solid var(--black);
        animation: popShrink 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    
    @keyframes trailFade {
        0% { opacity: 1; transform: scale(1) translateY(0); }
        100% { opacity: 0; transform: scale(0.2) translateY(30px); }
    }
    @keyframes popShrink {
        0% { transform: scale(0); }
        40% { transform: scale(1.5); }
        100% { transform: scale(0); opacity: 0; }
    }

    
    .click-burst {
        width: 150px;
        height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
        animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .click-burst svg {
        width: 100%; height: 100%;
        filter: drop-shadow(4px 4px 0px rgba(0,0,0,0.1));
    }
    .click-burst.text {
        font-family: var(--font-marker);
        font-size: 4rem;
        font-weight: 900;
        color: var(--white);
        -webkit-text-stroke: 3px var(--black);
        text-shadow: 6px 6px 0px var(--pink);
        white-space: nowrap;
    }

    @keyframes popIn {
        0% { transform: scale(0) rotate(-20deg); opacity: 0; }
        60% { transform: scale(1.2) rotate(10deg); opacity: 1; }
        100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes fadeOutFast {
        to { opacity: 0; transform: scale(0.8) translateY(20px); }
    }

    
    .mash-collage {
        position: absolute;
        width: 400px;
        height: auto;
        animation: slamDown 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        display: flex;
        flex-direction: column;
    }
    
    
    .photo-box {
        background-color: var(--blue);
        padding: 15px;
        border-radius: 10px;
        position: relative;
        box-shadow: 15px 15px 0px rgba(0,0,0,0.15);
        z-index: 1;
    }
    .photo-box img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 5px;
        filter: contrast(1.1) saturate(1.2); 
    }
    
    
    .mash-collage .overlay-doodle {
        position: absolute;
        width: 200px;
        z-index: 2;
        filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.2));
    }
    
    
    .mash-collage .pink-squiggle {
        position: absolute;
        width: 150px;
        height: 150px;
        z-index: 3;
        top: -30px;
        right: -30px;
        pointer-events: none;
    }

    @keyframes slamDown {
        0% { transform: translateY(-100vh) rotate(15deg) scale(1.5); opacity: 0.5; }
        100% { transform: translateY(0) rotate(var(--rot)) scale(1); opacity: 1; }
    }
    
</style>
</head>
<body vid="9">

<div class="bg-pattern" vid="10"></div>

<div id="canvas" vid="11">
    <div id="prompt" vid="12">
        <h1 vid="13">Mash It!</h1>
        <p vid="14">Type! Click! Wiggle!</p>
    </div>
</div>

<script vid="15">
    const canvas = document.getElementById('canvas');
    const promptEl = document.getElementById('prompt');
    let zIndexCounter = 10;
    let hasInteracted = false;
    let lastMouseX = 0, lastMouseY = 0;
    let mouseThrottle = false;
    let actionsUntilNextCollage = getNextCollageCountdown();

    

    const emojis = ['🐱', '🐾', '🐟', '🧶', '😻', '😸', '🙀', '⭐', '✨'];
    
    const catImages = [
        'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1495360010541-f48722b34f7d?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1519052537078-e6302a4968d4?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1513360371669-4adf3dd7dff8?auto=format&fit=crop&w=600&q=80',
        'https://images.unsplash.com/photo-1543852786-1cf6624b9987?auto=format&fit=crop&w=600&q=80'
    ];

    const buzzwords = ["MEOW!", "PURR", "BOOP!", "YUM!", "WONDERFUR!"];

    
    const svgAssets = {
        catHead: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 45 C 5 20, 20 10, 30 25 C 40 15, 60 15, 70 25 C 80 10, 95 20, 85 45 C 95 65, 80 90, 50 90 C 20 90, 5 65, 15 45 Z" fill="white" stroke="#111" stroke-width="4" stroke-linejoin="round"/><circle cx="35" cy="50" r="4" fill="#111"/><circle cx="65" cy="50" r="4" fill="#111"/><path d="M45 60 Q 50 65, 55 60" stroke="#111" stroke-width="3" stroke-linecap="round"/><path d="M10 50 L 25 55 M 8 60 L 25 60 M 12 70 L 27 65 M 90 50 L 75 55 M 92 60 L 75 60 M 88 70 L 73 65" stroke="#111" stroke-width="3" stroke-linecap="round"/></svg>`,
        paw: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M50 40 C 30 40, 20 60, 30 80 C 40 90, 60 90, 70 80 C 80 60, 70 40, 50 40 Z" fill="white" stroke="#111" stroke-width="4"/><circle cx="30" cy="30" r="12" fill="white" stroke="#111" stroke-width="4"/><circle cx="50" cy="15" r="14" fill="white" stroke="#111" stroke-width="4"/><circle cx="70" cy="30" r="12" fill="white" stroke="#111" stroke-width="4"/></svg>`,
        pinkSquiggle: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 50 Q 25 10, 50 50 T 90 50 M 50 50 Q 75 90, 90 50" stroke="#EE357B" stroke-width="6" stroke-linecap="round" fill="none"/></svg>`,
        pinkLoop: `<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 80 C -10 40, 40 -10, 70 20 C 100 50, 80 100, 40 80 C 10 65, 20 20, 60 30" stroke="#EE357B" stroke-width="5" stroke-linecap="round" fill="none"/></svg>`
    };

    

    function random(min, max) {
        return Math.random() * (max - min) + min;
    }

    function getNextCollageCountdown() {
        return 9 + Math.floor(Math.random() * 3);
    }

    const meowSampleUrls = __LASER_SPRINT_MEOW_URLS__;

    const meowPlayers = meowSampleUrls.map((src) => {
        const audio = new Audio(src);
        audio.preload = 'auto';
        audio.volume = 0.42;
        if (typeof audio.load === 'function') {
            audio.load();
        }
        return audio;
    });

    function playMeow() {
        if (meowPlayers.length === 0) {
            return;
        }

        const source = meowPlayers[Math.floor(Math.random() * meowPlayers.length)];
        const audio = new Audio(source.src);
        audio.volume = 0.36 + Math.random() * 0.12;
        audio.play().catch(() => {});
    }

    function removeAfter(el, time) {
        setTimeout(() => {
            el.style.animation = 'fadeOutFast 0.3s forwards';
            setTimeout(() => el.remove(), 300);
        }, time);
    }

    function hidePrompt() {
        if (!hasInteracted) {
            promptEl.classList.add('hidden');
            hasInteracted = true;
        }
    }

    

    
    document.addEventListener('mousemove', (e) => {
        hidePrompt();
        
        
        const speed = Math.abs(e.clientX - lastMouseX) + Math.abs(e.clientY - lastMouseY);
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;

        if (mouseThrottle || speed < 10) return;
        mouseThrottle = true;
        setTimeout(() => mouseThrottle = false, 50); 

        const el = document.createElement('div');
        el.className = 'spawn';
        el.style.left = `${e.clientX}px`;
        el.style.top = `${e.clientY}px`;
        el.style.zIndex = zIndexCounter++;

        
        if (Math.random() > 0.3) {
            el.classList.add('trail-item');
            el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.transform = `rotate(${random(-45, 45)}deg) scale(${random(0.5, 1.5)})`;
        } else {
            el.classList.add('trail-dot');
        }

        canvas.appendChild(el);
        removeAfter(el, 800);
    });

    
    document.addEventListener('mousedown', (e) => {
        hidePrompt();
        spawnClickBurst(e.clientX, e.clientY);
    });

    
    document.addEventListener('touchstart', (e) => {
        e.preventDefault(); 
        hidePrompt();
        Array.from(e.touches).forEach(touch => {
            spawnClickBurst(touch.clientX, touch.clientY);
        });
    }, {passive: false});

    function spawnClickBurst(x, y, { allowCatHead = true } = {}) {
        const el = document.createElement('div');
        el.className = 'spawn click-burst';
        el.style.left = `${x - 75}px`; 
        el.style.top = `${y - 75}px`;
        el.style.zIndex = zIndexCounter++;

        const type = Math.random();
        
        if (type < 0.3) {
            
            el.classList.add('text');
            el.innerText = buzzwords[Math.floor(Math.random() * buzzwords.length)];
        } else if (allowCatHead && type < 0.6) {
            
            el.innerHTML = svgAssets.catHead;
            playMeow();
        } else if (type < 0.8) {
            
            el.innerHTML = svgAssets.paw;
        } else {
            
            el.innerHTML = svgAssets.pinkLoop;
        }

        
        el.style.setProperty('--rot', `${random(-20, 20)}deg`);

        canvas.appendChild(el);
        removeAfter(el, 1500);
    }

    
    document.addEventListener('keydown', (e) => {
        if(e.repeat) return; 
        e.preventDefault(); 
        hidePrompt();
        actionsUntilNextCollage -= 1;

        if (actionsUntilNextCollage <= 0) {
            actionsUntilNextCollage = getNextCollageCountdown();
            spawnCollage();
            return;
        }

        spawnKeyboardBurst();
    });

    function spawnKeyboardBurst() {
        const minX = 75;
        const minY = 75;
        const maxX = Math.max(minX, window.innerWidth - 75);
        const maxY = Math.max(minY, window.innerHeight - 75);
        const x = random(minX, maxX);
        const y = random(minY, maxY);
        spawnClickBurst(x, y, { allowCatHead: false });
    }

    function spawnCollage() {
        const el = document.createElement('div');
        el.className = 'spawn mash-collage';
        
        
        const x = random(50, window.innerWidth - 450);
        const y = random(50, window.innerHeight - 350);
        const rot = random(-15, 15);
        
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        el.style.setProperty('--rot', `${rot}deg`);
        el.style.zIndex = zIndexCounter++;

        
        const photoBox = document.createElement('div');
        photoBox.className = 'photo-box';
        
        const img = document.createElement('img');
        img.src = catImages[Math.floor(Math.random() * catImages.length)];
        photoBox.appendChild(img);
        playMeow();

        
        const doodle = document.createElement('div');
        doodle.className = 'overlay-doodle';
        doodle.innerHTML = Math.random() > 0.5 ? svgAssets.catHead : svgAssets.paw;
        
        doodle.style.bottom = `${random(-30, 20)}px`;
        doodle.style[Math.random() > 0.5 ? 'left' : 'right'] = `${random(-50, -10)}px`;
        doodle.style.transform = `rotate(${random(-30, 30)}deg) scale(${random(0.8, 1.2)})`;

        
        const squiggle = document.createElement('div');
        squiggle.className = 'pink-squiggle';
        squiggle.innerHTML = Math.random() > 0.5 ? svgAssets.pinkSquiggle : svgAssets.pinkLoop;
        
        el.appendChild(photoBox);
        el.appendChild(doodle);
        el.appendChild(squiggle);

        canvas.appendChild(el);
        
        
        removeAfter(el, 4000);
    }

    
    setInterval(() => {
        const spawns = document.querySelectorAll('.spawn');
        if (spawns.length > 80) {
            
            for(let i=0; i < spawns.length - 80; i++) {
                spawns[i].remove();
            }
        }
    }, 2000);

</script>

</body></html>
