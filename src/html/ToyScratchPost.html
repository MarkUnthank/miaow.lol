<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
    <title vid="4">MEOW MASH!</title>
    <style vid="5">
        :root {
            --bg: #fdfcf8;
            --lines: #cce5ff;
            --margin: #ff52d9;
            --yellow: #ffea00;
            --blue: #0077ff;
            --pink: #ff52d9;
            --ink: #1a1a1a;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg);
            
            background-image: 
                linear-gradient(90deg, transparent 95px, var(--margin) 95px, var(--margin) 98px, transparent 98px),
                linear-gradient(var(--lines) 1px, transparent 1px);
            background-size: 100% 100%, 100% 40px;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive;
            cursor: crosshair;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 10;
        }

        
        #instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-3deg);
            background: var(--yellow);
            color: var(--ink);
            padding: 20px 40px;
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            border: 4px solid var(--ink);
            box-shadow: 10px 10px 0 var(--pink);
            z-index: 100;
            transition: opacity 0.5s ease, transform 0.5s ease;
            text-align: center;
            line-height: 1.1;
        }

        #instruction.hidden {
            opacity: 0;
            transform: translate(-50%, -60%) rotate(5deg) scale(0.8);
            pointer-events: none;
        }

        .sub-text {
            font-size: 1.5rem;
            display: block;
            margin-top: 10px;
            font-family: sans-serif;
            letter-spacing: normal;
        }

        
        .spawn {
            position: absolute;
            will-change: transform, opacity;
            
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.15));
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(var(--rot-start)); opacity: 0; }
            70% { transform: scale(1.2) rotate(var(--rot-mid)); opacity: 1; }
            100% { transform: scale(1) rotate(var(--rot-end)); opacity: 1; }
        }

        @keyframes floatAway {
            100% { transform: translateY(100vh) rotate(var(--rot-end)); opacity: 0; }
        }

        

        
        .sticker-emoji {
            font-size: var(--size);
            
            text-shadow: 
                -4px -4px 0 var(--white), 4px -4px 0 var(--white), 
                -4px 4px 0 var(--white), 4px 4px 0 var(--white),
                -4px 0 0 var(--white), 4px 0 0 var(--white), 
                0 -4px 0 var(--white), 0 4px 0 var(--white),
                6px 6px 0 var(--ink);
        }

        
        .marker-word {
            font-size: var(--size);
            color: var(--ink);
            font-weight: 900;
            text-transform: uppercase;
            background-color: var(--bg-color);
            padding: 5px 20px;
            border-radius: 2px;
            box-shadow: 4px 4px 0 var(--white), 6px 6px 0 var(--ink);
            border: 3px solid var(--ink);
            white-space: nowrap;
        }

        
        .polaroid {
            background: var(--white);
            padding: 10px 10px 40px 10px;
            border: 2px solid #ddd;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            width: var(--size);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .polaroid-img {
            width: 100%;
            height: calc(var(--size) * 0.8);
            background: var(--lines);
            border: 2px solid var(--ink);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        
        .polaroid::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(-5deg);
            width: 60%;
            height: 30px;
            background: rgba(255, 234, 0, 0.7); 
            border: 1px solid rgba(0,0,0,0.1);
            z-index: 2;
        }

        
        .drawn-svg {
            width: var(--size);
            height: var(--size);
        }
        
        .drawn-svg path {
            fill: var(--white);
            stroke: var(--ink);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        
        .scribble-svg path {
            fill: none;
            stroke: var(--stroke-color);
            stroke-width: 15;
            stroke-linecap: round;
            opacity: 0.8;
            mix-blend-mode: multiply;
        }

    </style>
</head>
<body vid="6">

    <div id="instruction" vid="7">
        SMASH THE KEYBOARD!
        <span class="sub-text" vid="8">WIGGLE THE MOUSE!</span>
    </div>

    <div id="canvas" vid="9"></div>

<script vid="10">
    
    
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    
    document.body.addEventListener('click', () => { if(audioCtx.state === 'suspended') audioCtx.resume(); }, {once:true});
    document.body.addEventListener('keydown', () => { if(audioCtx.state === 'suspended') audioCtx.resume(); }, {once:true});

    function playPop() {
        if(audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.type = 'sine';
        
        const freq = 400 + Math.random() * 800;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 1.5, audioCtx.currentTime + 0.1);
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playMeow() {
        if(audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        
        osc.type = 'triangle';
        const startFreq = 800 + Math.random() * 400;
        osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
        
        osc.frequency.exponentialRampToValueAtTime(startFreq * 0.4, audioCtx.currentTime + 0.3);
        
        gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gainNode.gain.setTargetAtTime(0, audioCtx.currentTime + 0.1, 0.1);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
    }

    function playMash() {
        if(audioCtx.state === 'suspended') return;
        
        const bufferSize = audioCtx.sampleRate * 0.2; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1; 
        }
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1000 + Math.random()*2000, audioCtx.currentTime);
        
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        
        noise.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        noise.start();
    }


    
    const canvas = document.getElementById('canvas');
    const instruction = document.getElementById('instruction');
    let hasInteracted = false;

    
    const colors = ['#ff52d9', '#ffea00', '#0077ff'];
    const emojis = ['🐱', '😸', '🙀', '😻', '🐾', '🐟', '🧶', '✨', '💖', '⭐', '💢'];
    const words = ['MEOW!', 'PURRRR', 'SCRATCH', 'HISS', 'BAP!', 'MROW', 'FLUFF'];

    
    const svgs = [
        
        `<svg class="drawn-svg" viewBox="0 0 100 100"><path d="M10,90 Q10,50 30,30 L20,10 L40,20 Q50,15 60,20 L80,10 L70,30 Q90,50 90,90 Z" /><circle cx="35" cy="45" r="5" fill="#1a1a1a"/><circle cx="65" cy="45" r="5" fill="#1a1a1a"/><path d="M45,60 L50,65 L55,60" fill="none" stroke="#1a1a1a" stroke-width="4"/><path d="M20,55 L5,50 M20,65 L5,70 M80,55 L95,50 M80,65 L95,70" stroke="#1a1a1a" stroke-width="3"/></svg>`,
        
        `<svg class="drawn-svg" viewBox="0 0 100 100"><path d="M15,80 C15,30 85,30 85,80 Z" /><path d="M15,40 L5,15 L35,25 M85,40 L95,15 L65,25" /><path d="M30,50 Q40,40 50,50" fill="none" stroke="#1a1a1a" stroke-width="4"/><path d="M70,50 Q60,40 50,50" fill="none" stroke="#1a1a1a" stroke-width="4"/><circle cx="50" cy="65" r="3" fill="#1a1a1a"/></svg>`,
        
        `<svg class="drawn-svg" viewBox="0 0 100 100"><path d="M10,50 L90,50 M30,30 L30,70 M50,20 L50,80 M70,30 L70,70 M85,50 L95,40 L95,60 Z" /><circle cx="15" cy="50" r="8" fill="#fff" stroke="#1a1a1a" stroke-width="4"/><circle cx="12" cy="50" r="2" fill="#1a1a1a"/></svg>`
    ];

    const scribbleSvg = `<svg class="scribble-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M10,50 Q30,10 50,50 T90,50 Q70,90 50,50 T10,50" /></svg>`;

    function getRandom(min, max) {
        return Math.random() * (max - min) + min;
    }

    function removeElement(el, delay = 3000) {
        setTimeout(() => {
            el.style.transition = 'opacity 0.5s ease, transform 1s ease';
            el.style.opacity = '0';
            el.style.transform += ' translateY(100px)';
            setTimeout(() => el.remove(), 1000);
        }, delay);
    }

    function createBaseElement(x, y) {
        if (!hasInteracted) {
            hasInteracted = true;
            instruction.classList.add('hidden');
        }
        
        const el = document.createElement('div');
        el.className = 'spawn';
        
        
        const rStart = getRandom(-180, 180);
        const rMid = rStart + getRandom(-20, 20);
        const rEnd = rMid + getRandom(-10, 10);
        
        el.style.setProperty('--rot-start', `${rStart}deg`);
        el.style.setProperty('--rot-mid', `${rMid}deg`);
        el.style.setProperty('--rot-end', `${rEnd}deg`);
        
        
        el.style.left = `${x}px`;
        el.style.top = `${y}px`;
        
        return el;
    }

    

    
    let lastMouseTime = 0;
    function handlePointerMove(e) {
        const now = Date.now();
        if (now - lastMouseTime < 40) return; 
        lastMouseTime = now;

        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        if(x===undefined || y===undefined) return;

        const el = createBaseElement(x, y);
        el.classList.add('sticker-emoji');
        
        
        const size = getRandom(1.5, 4);
        el.style.setProperty('--size', `${size}rem`);
        el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        
        
        el.style.transform = 'translate(-50%, -50%)';
        
        canvas.appendChild(el);
        playPop();
        
        
        removeElement(el, 800);
    }

    
    function handleMash(e) {
        
        if(e.type === 'keydown') {
            if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
        }

        const x = getRandom(50, window.innerWidth - 50);
        const y = getRandom(50, window.innerHeight - 50);
        
        const el = createBaseElement(x, y);
        
        const rand = Math.random();
        
        if (rand < 0.3) {
            
            el.classList.add('marker-word');
            el.style.setProperty('--size', `${getRandom(3, 8)}rem`);
            el.style.setProperty('--bg-color', colors[Math.floor(Math.random() * colors.length)]);
            
            el.style.setProperty('--rot-end', `${getRandom(-30, 30)}deg`);
            el.innerText = words[Math.floor(Math.random() * words.length)];
            playMash();

        } else if (rand < 0.6) {
            
            el.innerHTML = svgs[Math.floor(Math.random() * svgs.length)];
            const svgNode = el.querySelector('.drawn-svg');
            
            
            const size = getRandom(150, 400);
            svgNode.style.setProperty('--size', `${size}px`);
            
            
            if(Math.random() > 0.5) {
               const path = svgNode.querySelector('path');
               path.style.stroke = colors[Math.floor(Math.random() * colors.length)];
            }
            playMeow();

        } else if (rand < 0.8) {
            
            el.classList.add('polaroid');
            const size = getRandom(200, 350);
            el.style.setProperty('--size', `${size}px`);
            
            
            const innerSvg = svgs[0]; 
            const bgColor = colors[Math.floor(Math.random() * colors.length)];
            el.innerHTML = `
                <div class="polaroid-img" style="background-color: ${bgColor}">
                    ${innerSvg}
                </div>
                <div style="margin-top: 10px; font-family: 'Marker Felt', cursive; font-size: 1.2rem;">Cat #${Math.floor(Math.random()*999)}</div>
            `;
            
            const innerSvgNode = el.querySelector('svg');
            innerSvgNode.style.width = '80%';
            innerSvgNode.style.height = '80%';
            playMash();

        } else {
            
            const scribbleColor = colors[Math.floor(Math.random() * colors.length)];
            el.innerHTML = `
                <div style="position: relative; width: ${getRandom(150,300)}px; height: ${getRandom(100,200)}px;">
                    <div style="position: absolute; width: 100%; height: 100%; top:0; left:0; --stroke-color: ${scribbleColor};">
                        ${scribbleSvg}
                    </div>
                    <div class="sticker-emoji" style="position: absolute; top:50%; left:50%; transform: translate(-50%, -50%); --size: 5rem;">
                        ${emojis[Math.floor(Math.random() * emojis.length)]}
                    </div>
                </div>
            `;
            playMeow();
        }

        
        el.style.transform = `translate(-50%, -50%) rotate(${el.style.getPropertyValue('--rot-end')})`;
        
        canvas.appendChild(el);
        
        
        removeElement(el, getRandom(2000, 5000));
    }

    
    window.addEventListener('mousemove', handlePointerMove);
    window.addEventListener('touchmove', handlePointerMove, {passive: false});
    
    window.addEventListener('keydown', handleMash);
    window.addEventListener('click', handleMash);
    window.addEventListener('touchstart', (e) => {
        
        e.preventDefault();
        handleMash(e);
    }, {passive: false});

</script>

</body></html>
