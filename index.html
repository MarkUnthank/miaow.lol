<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIAOW.LOL - Cat Mash Toys!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-blue: #b4d5e7;
            --lavender: #d4c5f9;
            --pink: #f9709d;
            --yellow: #fce554;
            --green: #51ba5d;
            --orange: #fd764a;
            --purple: #8b4fb8;
            --aqua: #48b2c6;
            --text-dark: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--theme-bg, var(--bg-blue));
            font-family: 'Titan One', cursive;
            touch-action: none; 
            color: var(--text-dark);
            transition: background-color 0.5s ease;
        }

        /* Morphing Background Bubbles */
        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            transition: filter 0.5s ease;
        }

        .bg-wave-1 {
            position: absolute;
            top: -20%; left: -10%;
            width: 80vw; height: 80vw;
            background: var(--theme-w1, var(--pink));
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            border: 8px solid var(--text-dark);
            animation: morph 15s ease-in-out infinite alternate;
            opacity: 0.8;
            transition: background-color 0.5s ease;
        }

        .bg-wave-2 {
            position: absolute;
            bottom: -30%; right: -10%;
            width: 90vw; height: 90vw;
            background: var(--theme-w2, var(--yellow));
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            border: 8px solid var(--text-dark);
            animation: morph 20s ease-in-out infinite alternate-reverse;
            opacity: 0.8;
            transition: background-color 0.5s ease;
        }

        .bg-wave-3 {
            position: absolute;
            bottom: 20%; right: 20%;
            width: 40vw; height: 40vw;
            background: var(--theme-w3, var(--aqua));
            border-radius: 50%;
            border: 8px solid var(--text-dark);
            animation: float-slow 10s ease-in-out infinite alternate;
            opacity: 0.6;
            transition: background-color 0.5s ease;
        }

        @keyframes morph {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(0deg); }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: rotate(45deg); }
        }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Layout Structure */
        .app-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            text-align: center;
            padding: 2vh 0 1vh;
            flex-shrink: 0;
            z-index: 20;
        }

        .logo {
            font-size: clamp(3rem, 8vw, 6rem);
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
            color: var(--yellow);
            text-transform: uppercase;
            text-shadow: 
                -2px -2px 0 var(--text-dark),
                 2px -2px 0 var(--text-dark),
                -2px  2px 0 var(--text-dark),
                 2px  2px 0 var(--text-dark),
                 4px  4px 0 var(--text-dark),
                 8px  8px 0 var(--purple),
                 12px 12px 0 var(--text-dark);
            transform: rotate(-3deg);
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0%, 100% { transform: rotate(-3deg) translateY(0); }
            50% { transform: rotate(-1deg) translateY(-10px); }
        }

        .subtitle {
            font-family: sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: clamp(1rem, 3vw, 1.5rem);
            margin-top: 10px;
            color: var(--text-dark);
            background: white;
            display: inline-block;
            padding: 5px 15px;
            border: 3px solid var(--text-dark);
            border-radius: 50px;
            box-shadow: 4px 4px 0 var(--text-dark);
            transform: rotate(2deg);
        }

        /* Main Carousel Area */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            z-index: 20;
            padding-bottom: 2vh;
        }

        /* Carousel Content */
        .carousel-wrap {
            width: 100%;
            flex-grow: 1;
            display: flex;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .carousel {
            display: flex;
            gap: 40px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 40px 50vw 60px 50vw; /* Padding to center first/last items */
            -ms-overflow-style: none; /* IE/Edge */
            scrollbar-width: none; /* Firefox */
            scroll-behavior: smooth;
        }

        .carousel::-webkit-scrollbar {
            display: none;
        }

        /* Browser Window Card */
        .card {
            flex: 0 0 300px;
            height: 380px;
            scroll-snap-align: center;
            background-color: var(--pink);
            border: 6px solid var(--text-dark);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 8px 8px 0 var(--green), 16px 16px 0 var(--text-dark);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            /* Adjust padding compensation so items are dead center */
            margin-left: -150px;
        }
        
        .card:first-child {
            margin-left: calc(0px - 150px);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 12px 12px 0 var(--green), 24px 24px 0 var(--text-dark);
        }

        .card.active {
            transform: scale(1.1) translateY(-15px);
            z-index: 10;
            box-shadow: 12px 12px 0 var(--yellow), 24px 24px 0 var(--text-dark);
        }

        .window-header {
            background-color: var(--lavender);
            border-bottom: 6px solid var(--text-dark);
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px 10px 0 0;
            position: relative;
            flex-shrink: 0;
        }

        .window-dots {
            position: absolute;
            left: 15px;
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            border: 3px solid var(--text-dark);
        }
        .dot:nth-child(1) { background-color: var(--pink); }
        .dot:nth-child(2) { background-color: var(--yellow); }
        .dot:nth-child(3) { background-color: var(--green); }

        .window-title {
            font-family: sans-serif;
            font-weight: 800;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dark);
        }

        /* Card Content Placeholders */
        .card-content {
            flex-grow: 1;
            border-radius: 0 0 10px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: white;
        }

        .card-emoji {
            font-size: 5rem;
            filter: drop-shadow(4px 4px 0px var(--text-dark));
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        .card:hover .card-emoji {
            transform: scale(1.2) rotate(10deg);
        }

        .card-title {
            font-size: 1.8rem;
            line-height: 1.1;
            text-align: center;
            padding: 0 20px;
            color: var(--text-dark);
            text-shadow: 2px 2px 0 white;
            z-index: 2;
        }

        .card-play-badge {
            position: absolute;
            bottom: 20px;
            background: var(--yellow);
            color: var(--text-dark);
            font-size: 1.2rem;
            padding: 5px 20px;
            border: 4px solid var(--text-dark);
            border-radius: 50px;
            box-shadow: 4px 4px 0 var(--text-dark);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover .card-play-badge,
        .card.active .card-play-badge {
            transform: translateY(0);
            opacity: 1;
        }

        /* Action Buttons Area */
        .actions {
            display: flex;
            justify-content: center;
            padding: 2vh 20px;
            z-index: 30;
            flex-shrink: 0;
            margin-bottom: 2vh;
        }

        .btn-surprise {
            font-family: 'Titan One', cursive;
            background-color: var(--orange);
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            padding: 15px 40px;
            border: 6px solid var(--text-dark);
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 
                0 0 0 4px var(--bg-blue),
                8px 8px 0 var(--text-dark);
            transition: all 0.1s ease;
            text-shadow: 2px 2px 0 var(--text-dark);
            position: relative;
            overflow: hidden;
        }

        .btn-surprise:active {
            transform: translate(4px, 4px);
            box-shadow: 
                0 0 0 4px var(--bg-blue),
                4px 4px 0 var(--text-dark);
        }

        .btn-surprise::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: rgba(255,255,255,0.3);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* Color classes for cards */
        .c-pink { background-color: var(--pink); }
        .c-yellow { background-color: var(--yellow); }
        .c-green { background-color: var(--green); }
        .c-aqua { background-color: var(--aqua); }
        .c-purple { background-color: var(--purple); }
        .c-orange { background-color: var(--orange); }

        /* Media Queries */
        @media (max-width: 768px) {
            .card {
                flex: 0 0 250px;
                height: 320px;
                margin-left: -125px;
            }
            .card:first-child {
                margin-left: calc(0px - 125px);
            }
            .card-emoji { font-size: 4rem; }
            .card-title { font-size: 1.4rem; }
        }

        /* Hide scrollbars but keep scrolling */
        ::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="bg-wave-1"></div>
        <div class="bg-wave-2"></div>
        <div class="bg-wave-3"></div>
    </div>

    <div class="app-container">
        <header>
            <h1 class="logo">
                <span style="color: var(--pink)">M</span><span style="color: var(--yellow)">I</span><span style="color: var(--green)">A</span><span style="color: var(--aqua)">O</span><span style="color: var(--purple)">W</span><span style="color: var(--text-dark)">.LOL</span>
            </h1>
            <br>
            <div class="subtitle">15 Kitty Mash Toys!</div>
        </header>

        <main>
            <div class="carousel-wrap">
                <div class="carousel" id="carousel">
                    <!-- Cards injected via JS -->
                </div>
            </div>

            <div class="actions">
                <button id="btn-surprise" class="btn-surprise">🎲 Surprise Me!</button>
            </div>
        </main>
    </div>

    <script>
        const experiences = [
            { file: "design-02ec5deb-e51d-4a10-85fc-4b94b5da67e9.html", title: "Cat Mash Chaos", emoji: "🙀", color: "c-pink" },
            { file: "design-0e49295a-afea-47ff-952e-4e0cecc3f941.html", title: "Sensory OS", emoji: "🖥️", color: "c-yellow" },
            { file: "design-26094345-aa1e-4b12-b29b-c9fec0190f0c.html", title: "Bubble Meow", emoji: "🫧", color: "c-aqua" },
            { file: "design-2c7aa100-7eb4-4beb-a9df-50d3f61b4ee1.html", title: "Purrfect Piano", emoji: "🎹", color: "c-green" },
            { file: "design-402cb9af-1191-45d8-9e72-7f8dd2eea956.html", title: "Yarn Ball Bounce", emoji: "🧶", color: "c-orange" },
            { file: "design-5a7a680d-a907-427d-8fe2-4c7ac1565c26.html", title: "Laser Sprint", emoji: "🔴", color: "c-purple" },
            { file: "design-5e0a77c2-b172-4e8a-bc69-52eae8db0578.html", title: "Midnight Zoomies", emoji: "⚡", color: "c-pink" },
            { file: "design-73560c7b-c73c-4fa9-893a-35b0afde142d.html", title: "Squishy Paws", emoji: "🐾", color: "c-yellow" },
            { file: "design-77795530-63da-4a62-acde-623af9caf03c.html", title: "Box Fort", emoji: "📦", color: "c-aqua" },
            { file: "design-84b023ba-f701-4a16-96de-a49aeed793fc.html", title: "Fishy Dream", emoji: "🐟", color: "c-green" },
            { file: "design-84bbbb69-ce2a-48c8-a390-78aae7a06b1b.html", title: "Tuna Tambourine", emoji: "🪗", color: "c-orange" },
            { file: "design-a4245be1-3051-4179-a192-0824e41314a5.html", title: "Scratch Post", emoji: "🧗", color: "c-purple" },
            { file: "design-ae20ad34-22b9-48e3-b2a6-a2c7e49f22ed.html", title: "Nap Nebula", emoji: "💤", color: "c-pink" },
            { file: "design-ae534996-db42-43ca-b649-c55a04fb3cdd.html", title: "Treat 3000", emoji: "🍬", color: "c-yellow" },
            { file: "design-da274995-0b13-4f2a-96aa-532ac3ea5645.html", title: "Feline Flipper", emoji: "🐬", color: "c-aqua" }
        ];

        const carousel = document.getElementById('carousel');
        const btnSurprise = document.getElementById('btn-surprise');

        // Render cards
        experiences.forEach((exp, index) => {
            const card = document.createElement('div');
            card.className = `card`;
            card.dataset.index = index;
            card.dataset.file = exp.file;
            card.dataset.color = exp.color;
            
            card.innerHTML = `
                <div class="window-header">
                    <div class="window-dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                    <div class="window-title">Toy #${(index + 1).toString().padStart(2, '0')}</div>
                </div>
                <div class="card-content ${exp.color}">
                    <div class="card-emoji">${exp.emoji}</div>
                    <div class="card-title">${exp.title}</div>
                    <div class="card-play-badge">PLAY!</div>
                </div>
            `;
            
            card.addEventListener('click', () => {
                // Navigate to the source file
                window.location.href = `sources/${exp.file}`;
            });
            
            card.addEventListener('mouseenter', () => {
                updateThemeVariables(exp.color);
            });
            
            card.addEventListener('mouseleave', () => {
                const activeCard = document.querySelector('.card.active');
                if (activeCard) {
                    updateThemeVariables(activeCard.dataset.color);
                } else {
                    updateThemeVariables('default');
                }
            });

            carousel.appendChild(card);
        });

        // Theme management
        const colorPalette = {
            'c-pink': { bg: '#ff9ebf', w1: 'var(--yellow)', w2: 'var(--aqua)', w3: 'var(--purple)' },
            'c-yellow': { bg: '#fdf196', w1: 'var(--pink)', w2: 'var(--green)', w3: 'var(--orange)' },
            'c-green': { bg: '#8ae594', w1: 'var(--yellow)', w2: 'var(--aqua)', w3: 'var(--pink)' },
            'c-aqua': { bg: '#8ad8e8', w1: 'var(--purple)', w2: 'var(--pink)', w3: 'var(--yellow)' },
            'c-purple': { bg: '#b37ee5', w1: 'var(--orange)', w2: 'var(--aqua)', w3: 'var(--yellow)' },
            'c-orange': { bg: '#ff9c7a', w1: 'var(--purple)', w2: 'var(--yellow)', w3: 'var(--pink)' }
        };

        function updateThemeVariables(colorClass) {
            const colors = colorPalette[colorClass];
            if (colors) {
                document.documentElement.style.setProperty('--theme-bg', colors.bg);
                document.documentElement.style.setProperty('--theme-w1', colors.w1);
                document.documentElement.style.setProperty('--theme-w2', colors.w2);
                document.documentElement.style.setProperty('--theme-w3', colors.w3);
            } else {
                document.documentElement.style.setProperty('--theme-bg', 'var(--bg-blue)');
                document.documentElement.style.setProperty('--theme-w1', 'var(--pink)');
                document.documentElement.style.setProperty('--theme-w2', 'var(--yellow)');
                document.documentElement.style.setProperty('--theme-w3', 'var(--aqua)');
            }
        }

        // Highlight center card
        const cards = document.querySelectorAll('.card');
        
        function updateActiveCard() {
            const carouselCenter = carousel.offsetWidth / 2;
            let closestCard = null;
            let minDistance = Infinity;

            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const cardCenter = rect.left + rect.width / 2;
                // Calculate distance relative to the window center since fixed layout
                const distance = Math.abs(window.innerWidth / 2 - cardCenter);

                if (distance < minDistance) {
                    minDistance = distance;
                    closestCard = card;
                }
            });

            cards.forEach(c => c.classList.remove('active'));
            if (closestCard) {
                closestCard.classList.add('active');
                updateThemeVariables(closestCard.dataset.color);
            }
        }

        // Initialize active card and listen for scroll
        carousel.addEventListener('scroll', () => {
            requestAnimationFrame(updateActiveCard);
        });
        
        // Initial call after small delay to ensure DOM is ready
        setTimeout(updateActiveCard, 50);
        window.addEventListener('resize', updateActiveCard);

        // Center on a specific card
        function scrollToCard(index) {
            const card = cards[index];
            if (!card) return;
            
            const cardRect = card.getBoundingClientRect();
            const carouselRect = carousel.getBoundingClientRect();
            
            const scrollLeft = card.offsetLeft - carouselRect.width / 2;
            carousel.scrollTo({
                left: scrollLeft,
                behavior: 'smooth'
            });
        }

        // Surprise Me Logic
        btnSurprise.addEventListener('click', () => {
            // Pick a random card
            const randomIndex = Math.floor(Math.random() * experiences.length);
            scrollToCard(randomIndex);
            
            // Add a fun bounce effect to the button
            btnSurprise.style.transform = "scale(0.9)";
            setTimeout(() => {
                btnSurprise.style.transform = "scale(1.1)";
                setTimeout(() => {
                    btnSurprise.style.transform = "";
                }, 150);
            }, 100);

            // Optional: Automatically launch it after scrolling?
            // setTimeout(() => {
            //      window.location.href = `sources/${experiences[randomIndex].file}`;
            // }, 800);
        });

        // Mouse Drag to Scroll
        let isDown = false;
        let startX;
        let scrollLeft;

        carousel.addEventListener('mousedown', (e) => {
            isDown = true;
            carousel.style.scrollSnapType = 'none'; // Disable snapping while dragging
            carousel.style.cursor = 'grabbing';
            startX = e.pageX - carousel.offsetLeft;
            scrollLeft = carousel.scrollLeft;
        });
        carousel.addEventListener('mouseleave', () => {
            isDown = false;
            carousel.style.scrollSnapType = 'x mandatory';
            carousel.style.cursor = 'pointer';
            updateActiveCard();
        });
        carousel.addEventListener('mouseup', () => {
            isDown = false;
            carousel.style.scrollSnapType = 'x mandatory';
            carousel.style.cursor = 'pointer';
            // Quick snap logic: finding closest card to center to snap manually since scroll-snap is finicky with JS drag
            updateActiveCard();
        });
        carousel.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - carousel.offsetLeft;
            const walk = (x - startX) * 2; // Scroll speed multiplier
            carousel.scrollLeft = scrollLeft - walk;
        });

    </script>
</body>
</html>
